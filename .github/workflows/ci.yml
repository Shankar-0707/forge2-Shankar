name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: pulsedesk_test
          MYSQL_ALLOW_EMPTY_PASSWORD: "no"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -ppassword"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, mysql, openssl, zip, tokenizer, xml, ctype, json, bcmath, curl
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist --no-scripts --no-progress

      - name: Generate .env for CI
        working-directory: backend
        run: |
          cp .env.example .env
          sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=mysql/' .env
          echo "DB_HOST=127.0.0.1"            >> .env
          echo "DB_PORT=3306"                  >> .env
          echo "DB_DATABASE=pulsedesk_test"    >> .env
          echo "DB_USERNAME=root"              >> .env
          echo "DB_PASSWORD=password"          >> .env
          echo "APP_ENV=testing"               >> .env
          php artisan key:generate

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -u root -ppassword --silent && break
            echo "Waiting for MySQL... attempt $i"
            sleep 2
          done

      - name: Run migrations
        working-directory: backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: pulsedesk_test
          DB_USERNAME: root
          DB_PASSWORD: password
          APP_ENV: testing
        run: php artisan migrate --force

      - name: Run tests
        working-directory: backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: pulsedesk_test
          DB_USERNAME: root
          DB_PASSWORD: password
          APP_ENV: testing
        run: php artisan test tests/Feature/TenantIsolationTest.php tests/Feature/AuthTest.php --stop-on-failure